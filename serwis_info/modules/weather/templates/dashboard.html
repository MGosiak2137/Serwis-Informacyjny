<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Weather Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('weather.static', filename='styleweather.css') }}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

  <!-- Powrót (domek) -->
  <a href="/" class="weather-back-btn" title="Powrót do strony głównej">🏠</a>

  <main class="weather-dashboard">
    
    <!-- LEWY PANEL -->
    <aside class="weather-sidebar-left">
      <div class="weather-hero">
        <h1>Weather Dashboard</h1>
        <p>Cześć, <span id="usernameDisplay">User</span>!</p>
      </div>
      
      <div class="weather-panel">
        <h3>Panel użytkownika</h3>
        <button id="togglePanelBtn" class="weather-btn-secondary">Rozwiń panel</button>
        <div id="panelContent" class="hidden">
          <div id="defaultCitySection">
            <p><strong>Domyślne miasto:</strong> <span id="defaultCityValue">brak</span></p>
            <button id="setDefaultBtn" class="hidden weather-btn-secondary">Ustaw domyślne miasto</button>
            <button id="changeDefaultBtn" class="hidden weather-btn-secondary">Zmień</button>
            <button id="deleteDefaultBtn" class="hidden weather-btn-secondary danger">Usuń</button>
          </div>
        </div>
      </div>

      <div class="weather-panel weather-alerts">
        <h3>Ostrzeżenia</h3>
        <p id="alertsContent">Brak aktywnych ostrzeżeń</p>
      </div>
    </aside>

    <!-- GŁÓWNA CZĘŚĆ -->
    <section class="weather-main">
      
      <!-- WYSZUKIWARKA -->
      <div class="weather-search-box">
        <input type="text" id="cityInput" placeholder="Szukaj miasta...">
        <button id="searchBtn" class="weather-btn-primary">Szukaj</button>
      </div>

      <!-- INFO POGODOWE (ukryte do czasu wyszukania) -->
      <div id="weatherInfo" class="weather-info-panel" style="display:none;"></div>

      <!-- MAPA (duża i widoczna) -->
      <div class="weather-map-container">
        <div id="map"></div>
        <div id="legendContainer"></div>
      </div>

      <!-- NAKŁADKI MAPY -->
      <div class="weather-layers-box">
        <h3>Warstwy mapy</h3>
        <div id="layerSelector" class="weather-layer-selector">
          <button type="button" class="layer-btn" data-layer="temp">
            Temperatura
          </button>
          <button type="button" class="layer-btn" data-layer="rain">
            Opady
          </button>
          <button type="button" class="layer-btn" data-layer="clouds">
            Zachmurzenie
          </button>
          <button type="button" class="layer-btn" data-layer="wind">
            Wiatr
          </button>
          <button type="button" class="layer-btn" data-layer="none">
            Brak
          </button>
        </div>
      </div>

      <!-- HISTORIA WYSZUKIWAŃ -->
      <section class="weather-history-section">
        <h3>Historia wyszukiwań</h3>
        <ul id="historyList"></ul>
        <button id="clearHistoryBtn" class="weather-btn-secondary danger">Usuń historię</button>
      </section>

    </section>

  </main>

  <footer class="weather-footer">
    <p>© 2025 Serwis Informacyjny – Pogoda</p>
  </footer>

  <script type="module" src="{{ url_for('weather.static', filename='js/app.js') }}"></script>
</body>
</html>
